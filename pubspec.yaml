name: budkon_flutter
description: "Platforma dla firm budowlanych — budkon.pro"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  core:
    path: core
  flutter:
    sdk: flutter

  # Core deps (mirrored from superbee.core requirements)
  beamer: ^1.7.0
  flutter_riverpod: ^2.6.1
  flutter_screenutil: ^5.9.3
  pointycastle: ^3.9.1
  shared_preferences: ^2.3.3
  url_launcher: 6.2.5
  path_provider: ^2.1.4
  image_picker: ^1.2.1
  file_picker: ^9.2.0
  file_saver: ^0.3.1
  sentry_flutter: ^9.16.1
  flutter_cache_manager: ^3.4.1
  visibility_detector: ^0.4.0+2
  dotted_border: ^2.1.0
  country_code_picker: any

  firebase_analytics: ^11.3.0
  firebase_core: ^3.15.1
  firebase_messaging: ^15.2.5

  # Budkon modules
  przetargi:
    path: modules/przetargi
  budowa:
    path: modules/budowa
  kosztorysy:
    path: modules/kosztorysy
  oferty:
    path: modules/oferty
  harmonogram:
    path: modules/harmonogram
  materialy:
    path: modules/materialy
  podwykonawcy:
    path: modules/podwykonawcy
  dziennik:
    path: modules/dziennik
  portal_klienta:
    path: modules/portal_klienta

  # Moduły wspólne z Hously.pro (bez CRM/mail deps)
  notes:
    path: modules/notes
  chat:
    path: modules/chat
  emma:
    path: modules/emma
  calendar:
    path: modules/calendar
  automation:
    path: modules/automation

  # Batch 2 — przeniesione z Hously.pro
  crm:
    path: modules/crm
  crm_agent:
    path: modules/crm_agent
  crm_fliper:
    path: modules/crm_fliper
  docs:
    path: modules/docs
  cloud:
    path: modules/cloud
  importer:
    path: modules/importer
  feedback:
    path: modules/feedback
  profile:
    path: modules/profile
  company_cat:
    path: modules/company_cat
  mail:
    path: modules/mail
  fav_board:
    path: modules/fav_board
  tms_app:
    path: modules/tms_app
  portal:
    path: modules/portal
  network_monitoring:
    path: modules/network_monitoring
  notification:
    path: modules/notification
  seller:
    path: modules/seller
  wall:
    path: modules/wall
  payments:
    path: modules/payments
  reports:
    path: modules/reports
  articles:
    path: modules/articles
  association:
    path: modules/association
  map:
    path: modules/map
  boards:
    path: modules/boards

flutter:
  uses-material-design: true
  assets:
    - assets/
